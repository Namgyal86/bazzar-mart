_format_version: "3.0"
_transform: true

# =============================================================
# Bazzar — Kong API Gateway Declarative Configuration (deck)
# Apply with: deck sync --state infrastructure/kong/kong.yml
# =============================================================

# ---- Global Plugins -----------------------------------------

plugins:
  - name: cors
    config:
      origins:
        - "https://bazzar.com.np"
        - "https://www.bazzar.com.np"
        - "http://localhost:3000"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Authorization
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - X-Auth-Token
        - X-Requested-With
      exposed_headers:
        - X-Auth-Token
        - X-Request-Id
      credentials: true
      max_age: 3600
      preflight_continue: false

  - name: request-size-limiting
    config:
      allowed_payload_size: 10
      size_unit: megabytes
      require_content_length: false

# ---- Upstreams (load-balanced backends) ---------------------

upstreams:
  - name: user-service.upstream
    algorithm: round-robin
    healthchecks:
      active:
        healthy:
          interval: 10
          successes: 2
        unhealthy:
          interval: 5
          http_failures: 3
        http_path: /health
        timeout: 3
    targets:
      - target: user-service:8001
        weight: 100

