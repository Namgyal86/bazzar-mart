# ---- Services -----------------------------------------------

services:
  # ---- User Service -------------------------------------------
  - name: user-service
    url: http://user-service.upstream
    connect_timeout: 5000
    write_timeout: 60000
    read_timeout: 60000
    retries: 3
    routes:
      - name: user-service-auth-route
        paths:
          - /api/v1/auth
        strip_path: false
        preserve_host: true
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        plugins:
          # Public auth endpoints — rate-limit only, no JWT
          - name: rate-limiting
            config:
              minute: 100
              policy: local
              fault_tolerant: true
              hide_client_headers: false
              error_code: 429
              error_message: "Too many requests. Please try again later."

      - name: user-service-users-route
        paths:
          - /api/v1/users
        strip_path: false
        preserve_host: true
        methods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        plugins:
          - name: rate-limiting
            config:
              minute: 1000
              policy: local
              fault_tolerant: true
              hide_client_headers: false
              header_name: X-RateLimit-Limit-Minute
          - name: jwt
            config:
              uri_param_names:
                - jwt
              cookie_names: []
              key_claim_name: iss
              claims_to_verify:
                - exp
              anonymous: ~

  # ---- Product Service ----------------------------------------
  - name: product-service
    url: http://product-service.upstream
    connect_timeout: 5000
