name: Deploy Bazzar Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/bazzar
  K8S_NAMESPACE: bazzar

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================
  # JOB 1 — Lint + typecheck + test (3 services + web in parallel)
  # ===========================================================
  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-monolith
            dir: services/api-monolith
          - service: delivery-service
            dir: services/delivery-service
          - service: notification-service
            dir: services/notification-service
          - service: web
            dir: web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ matrix.dir }}/package.json

      - name: Install dependencies
        working-directory: ${{ matrix.dir }}
        # api-monolith has no lockfile — use npm install; others use npm ci
        run: |
          if [ "${{ matrix.service }}" = "api-monolith" ]; then
            npm install
          else
            npm ci --legacy-peer-deps
          fi

      - name: Typecheck
        working-directory: ${{ matrix.dir }}
        run: npm run typecheck --if-present

      - name: Lint
        working-directory: ${{ matrix.dir }}
        run: npm run lint --if-present

      - name: Unit tests
        working-directory: ${{ matrix.dir }}
        run: npm test --if-present
        env:
          NODE_ENV: test
          CI: true

  # ===========================================================
  # JOB 2 — Build and push Docker images (after tests pass)
  # ===========================================================
  build:
    name: Build ${{ matrix.service }}
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-monolith
            context: services/api-monolith
          - service: delivery-service
            context: services/delivery-service
          - service: notification-service
            context: services/notification-service
          - service: web-frontend
            context: web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            NODE_ENV=production
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}

  # ===========================================================
  # JOB 3 — Deploy to EKS (push to main only)
  # ===========================================================
  deploy:
    name: Deploy to EKS
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://bazzar.com.np
    permissions:
      contents: read
      id-token: write   # OIDC auth with AWS

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ap-south-1 \
            --name bazzar-eks-cluster

      - name: Set image tag
        id: image-tag
        run: echo "TAG=sha-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Apply namespace and config
        run: |
          kubectl apply -f infrastructure/k8s/namespace.yaml
          kubectl apply -f infrastructure/k8s/configmap.yaml

      - name: Apply PVC (idempotent — won't recreate if exists)
        run: |
          kubectl apply -f infrastructure/k8s/services/api-monolith.yaml \
            --dry-run=client -o yaml | \
            grep -A20 "kind: PersistentVolumeClaim" | \
            kubectl apply -f - || true
          kubectl apply -f infrastructure/k8s/services/api-monolith.yaml

      - name: Deploy all services
        run: |
          SERVICES=(api-monolith delivery-service notification-service)
          for SERVICE in "${SERVICES[@]}"; do
            echo "▶ Deploying ${SERVICE}..."
            kubectl set image deployment/${SERVICE} \
              ${SERVICE}=${{ env.IMAGE_PREFIX }}/${SERVICE}:${{ steps.image-tag.outputs.TAG }} \
              -n ${{ env.K8S_NAMESPACE }} || \
            kubectl apply -f infrastructure/k8s/services/${SERVICE}.yaml \
              -n ${{ env.K8S_NAMESPACE }}
          done

      - name: Apply ingress (web-frontend + routing)
        run: kubectl apply -f infrastructure/k8s/ingress.yaml

      - name: Update web-frontend image
        run: |
          kubectl set image deployment/web-frontend \
            web-frontend=${{ env.IMAGE_PREFIX }}/web-frontend:${{ steps.image-tag.outputs.TAG }} \
            -n ${{ env.K8S_NAMESPACE }} || \
          kubectl apply -f infrastructure/k8s/ingress.yaml

      - name: Wait for rollouts
        run: |
          for DEP in api-monolith delivery-service notification-service web-frontend; do
            echo "⏳ Waiting for ${DEP}..."
            kubectl rollout status deployment/${DEP} \
              -n ${{ env.K8S_NAMESPACE }} \
              --timeout=300s
          done

      - name: Verify pods and HPA
        run: |
          kubectl get pods -n ${{ env.K8S_NAMESPACE }} -o wide
          kubectl get hpa  -n ${{ env.K8S_NAMESPACE }}

  # ===========================================================
  # JOB 4 — Deploy web frontend to Vercel (push to main only)
  # ===========================================================
  deploy-vercel:
    name: Deploy Frontend to Vercel
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        working-directory: web
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        working-directory: web
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          # Server-side env vars — Vercel proxies /api/v1/* to the monolith
          MONOLITH_URL: https://api.bazzar.com.np
          DELIVERY_SERVICE_URL: https://api.bazzar.com.np
          NOTIFICATION_SERVICE_URL: https://api.bazzar.com.np
          NEXT_PUBLIC_WS_URL: wss://bazzar.com.np/api/v1/delivery

      - name: Deploy to Vercel production
        id: vercel-deploy
        working-directory: web
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "VERCEL_URL=${URL}" >> $GITHUB_OUTPUT

      - name: Output deployment URL
        run: echo "✅ Deployed to ${{ steps.vercel-deploy.outputs.VERCEL_URL }}"

  # ===========================================================
  # JOB 5 — Slack notification on success / failure
  # ===========================================================
  notify:
    name: Notify Slack
    needs: [deploy, deploy-vercel]
    runs-on: ubuntu-latest
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Determine overall status
        id: status
        run: |
          if [[ "${{ needs.deploy.result }}" == "success" && "${{ needs.deploy-vercel.result }}" == "success" ]]; then
            echo "STATUS=success" >> $GITHUB_OUTPUT
            echo "EMOJI=white_check_mark" >> $GITHUB_OUTPUT
            echo "COLOR=#36a64f" >> $GITHUB_OUTPUT
          else
            echo "STATUS=failure" >> $GITHUB_OUTPUT
            echo "EMOJI=x" >> $GITHUB_OUTPUT
            echo "COLOR=#dc3545" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "attachments": [
                {
                  "color": "${{ steps.status.outputs.COLOR }}",
                  "blocks": [
                    {
                      "type": "header",
                      "text": {
                        "type": "plain_text",
                        "text": ":${{ steps.status.outputs.EMOJI }}: Bazzar Deploy — ${{ steps.status.outputs.STATUS == 'success' && 'SUCCESS' || 'FAILED' }}"
                      }
                    },
                    {
                      "type": "section",
                      "fields": [
                        { "type": "mrkdwn", "text": "*Commit:*\n<${{ github.event.head_commit.url }}|`${{ github.sha }}`>" },
                        { "type": "mrkdwn", "text": "*Author:*\n${{ github.event.head_commit.author.name }}" },
                        { "type": "mrkdwn", "text": "*Message:*\n${{ github.event.head_commit.message }}" },
                        { "type": "mrkdwn", "text": "*Action:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>" }
                      ]
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
