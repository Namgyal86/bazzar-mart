apiVersion: v1
kind: ConfigMap
metadata:
  name: bazzar-config
  namespace: bazzar
  labels:
    app.kubernetes.io/part-of: bazzar
    app.kubernetes.io/managed-by: kubectl
data:
  NODE_ENV: "production"

  # ── Infrastructure (ClusterIP DNS) ───────────────────────────────────────────
  KAFKA_BROKERS: "bazzar-kafka-bootstrap.bazzar.svc.cluster.local:9092"
  KAFKA_CLIENT_ID: "api-monolith"
  KAFKA_GROUP_ID: "api-monolith-group"
  REDIS_URL: "redis://bazzar-redis.bazzar.svc.cluster.local:6379"
  MONGO_URI: "mongodb://bazzar-mongodb.bazzar.svc.cluster.local:27017/bazzar_db"

  # ── Monolith replaces 12 merged services ─────────────────────────────────────
  # Only delivery-service and notification-service remain separate.
  MONOLITH_URL: "http://api-monolith.bazzar.svc.cluster.local:8100"
  DELIVERY_SERVICE_URL: "http://delivery-service.bazzar.svc.cluster.local:8013"
  NOTIFICATION_SERVICE_URL: "http://notification-service.bazzar.svc.cluster.local:8008"

  # ── Public URLs (used by payment gateway callbacks) ──────────────────────────
  API_BASE_URL: "https://api.bazzar.com.np"
  WEB_URL: "https://bazzar.com.np"

  # ── Upload storage ────────────────────────────────────────────────────────────
  UPLOAD_DIR: "/app/uploads"

  # ── JWT config (non-secret) ───────────────────────────────────────────────────
  JWT_EXPIRES_IN: "15m"
  JWT_REFRESH_EXPIRES_IN: "7d"

  # ── AWS ───────────────────────────────────────────────────────────────────────
  AWS_REGION: "ap-south-1"

  # ── Misc ─────────────────────────────────────────────────────────────────────
  LOG_LEVEL: "info"
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX_REQUESTS: "100"
