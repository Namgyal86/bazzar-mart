# =============================================================
# Bazzar — User Service Kubernetes Manifests
# Handles: Auth, JWT, user profiles, addresses
# Port: 8001
# =============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: bazzar
  labels:
    app: user-service
    app.kubernetes.io/name: user-service
    app.kubernetes.io/part-of: bazzar
    app.kubernetes.io/version: latest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: user-service
        app.kubernetes.io/name: user-service
        app.kubernetes.io/part-of: bazzar
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: user-service
          image: ghcr.io/your-org/bazzar/user-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: bazzar-config
            - secretRef:
                name: bazzar-secrets
          env:
            - name: PORT
              value: "8001"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: bazzar-db-secrets
                  key: USER_SERVICE_MONGO_URI
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
      imagePullSecrets:
        - name: ghcr-pull-secret

---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: bazzar
  labels:
    app: user-service
    app.kubernetes.io/name: user-service
    app.kubernetes.io/part-of: bazzar
spec:
  type: ClusterIP
  selector:
    app: user-service
  ports:
    - name: http
      port: 8001
      targetPort: 8001
      protocol: TCP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: user-service-hpa
  namespace: bazzar
  labels:
    app: user-service
    app.kubernetes.io/part-of: bazzar
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: user-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
