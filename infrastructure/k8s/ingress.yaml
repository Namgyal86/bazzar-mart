# =============================================================
# Bazzar — Nginx Ingress Configuration
#
# Routes:
#   api.bazzar.com.np/*  → api-monolith (port 8100)  ← direct, Kong removed
#   bazzar.com.np/*      → web frontend  (port 3000)
#   www.bazzar.com.np/*  → web frontend  (redirect)
#
# Delivery WebSocket is served through the web frontend rewrite proxy
# so Flutter apps connect via wss://bazzar.com.np/api/v1/delivery/*
# =============================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bazzar-ingress
  namespace: bazzar
  labels:
    app.kubernetes.io/part-of: bazzar
    app.kubernetes.io/managed-by: kubectl
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # TLS / SSL
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Timeouts — allow long-polling for Socket.io and large image uploads
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    # Body size matches 10 MB upload limit in multer
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # WebSocket upgrade for delivery service Socket.io
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    # Rate limiting at Nginx layer
    nginx.ingress.kubernetes.io/limit-rps: "50"
    # Force HTTPS
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - bazzar.com.np
        - www.bazzar.com.np
        - api.bazzar.com.np
      secretName: bazzar-tls-secret

  rules:
    # --- API subdomain → api-monolith (Kong removed) ----------------------
    - host: api.bazzar.com.np
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-monolith
                port:
                  number: 8100

    # --- Root domain → Next.js web frontend --------------------------------
    - host: bazzar.com.np
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-frontend
                port:
                  number: 3000

    # --- www redirect → root domain ----------------------------------------
    - host: www.bazzar.com.np
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-frontend
                port:
                  number: 3000

---
# Web frontend service (Next.js)
apiVersion: v1
kind: Service
metadata:
  name: web-frontend
  namespace: bazzar
  labels:
    app: web-frontend
    app.kubernetes.io/part-of: bazzar
spec:
  type: ClusterIP
  selector:
    app: web-frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP

---
# Web frontend deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-frontend
  namespace: bazzar
  labels:
    app: web-frontend
    app.kubernetes.io/name: web-frontend
    app.kubernetes.io/part-of: bazzar
    app.kubernetes.io/version: latest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: web-frontend
        app.kubernetes.io/name: web-frontend
        app.kubernetes.io/part-of: bazzar
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: web-frontend
          image: ghcr.io/your-org/bazzar/web-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            # Monolith URL — used by Next.js server-side rewrites
            - name: MONOLITH_URL
              value: "http://api-monolith.bazzar.svc.cluster.local:8100"
            - name: DELIVERY_SERVICE_URL
              value: "http://delivery-service.bazzar.svc.cluster.local:8013"
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service.bazzar.svc.cluster.local:8008"
            # Public WebSocket URL for browser/Flutter clients
            - name: NEXT_PUBLIC_WS_URL
              value: "wss://bazzar.com.np/api/v1/delivery"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
      imagePullSecrets:
        - name: ghcr-pull-secret

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web-frontend-hpa
  namespace: bazzar
  labels:
    app: web-frontend
    app.kubernetes.io/part-of: bazzar
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web-frontend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
