# =============================================================
# Bazzar — Nginx Ingress Configuration
# Routes:
#   api.bazzar.com.np/*  → Kong API Gateway (port 8000)
#   bazzar.com.np/*      → Web Frontend (Next.js, port 3000)
# =============================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bazzar-ingress
  namespace: bazzar
  labels:
    app.kubernetes.io/part-of: bazzar
    app.kubernetes.io/managed-by: kubectl
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # TLS / SSL
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Timeouts — needed for Socket.io long-polling and large uploads
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    # Body size (matches Kong's 10 MB limit)
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # WebSocket upgrade for delivery service Socket.io
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    # Rate limiting at Nginx layer (first line of defence before Kong)
    nginx.ingress.kubernetes.io/limit-rps: "50"
    # HSTS
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - bazzar.com.np
        - www.bazzar.com.np
        - api.bazzar.com.np
      secretName: bazzar-tls-secret

  rules:
    # --- API subdomain → Kong Gateway ----------------------------
    - host: api.bazzar.com.np
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kong-proxy
                port:
                  number: 8000

    # --- Root domain → Next.js web frontend ---------------------
    - host: bazzar.com.np
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-frontend
                port:
                  number: 3000

    # --- www redirect → root domain ----------------------------
    - host: www.bazzar.com.np
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-frontend
                port:
                  number: 3000

---
# Kong proxy service (exposes Kong's proxy port inside the cluster)
apiVersion: v1
kind: Service
metadata:
  name: kong-proxy
  namespace: bazzar
  labels:
    app: kong
    app.kubernetes.io/part-of: bazzar
spec:
  type: ClusterIP
  selector:
    app: kong
  ports:
    - name: proxy
      port: 8000
      targetPort: 8000
      protocol: TCP
    - name: proxy-ssl
      port: 8443
      targetPort: 8443
      protocol: TCP

---
# Web frontend service (Next.js)
apiVersion: v1
kind: Service
metadata:
  name: web-frontend
  namespace: bazzar
  labels:
    app: web-frontend
    app.kubernetes.io/part-of: bazzar
spec:
  type: ClusterIP
  selector:
    app: web-frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP

---
# Web frontend deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-frontend
  namespace: bazzar
  labels:
    app: web-frontend
    app.kubernetes.io/name: web-frontend
    app.kubernetes.io/part-of: bazzar
    app.kubernetes.io/version: latest
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: web-frontend
        app.kubernetes.io/name: web-frontend
        app.kubernetes.io/part-of: bazzar
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: web-frontend
          image: ghcr.io/your-org/bazzar/web-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.bazzar.com.np"
            - name: NEXT_PUBLIC_WS_URL
              value: "wss://api.bazzar.com.np/api/v1/delivery"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
      imagePullSecrets:
        - name: ghcr-pull-secret

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web-frontend-hpa
  namespace: bazzar
  labels:
    app: web-frontend
    app.kubernetes.io/part-of: bazzar
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web-frontend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
