# Override to align env var names with the service code
# This file is automatically merged by docker-compose

version: '3.9'

services:
  user-service:
    environment:
      - MONGO_URI_USER=mongodb://mongo-user:27017/user_db
      - ALLOWED_ORIGINS=http://localhost:3000

  product-service:
    environment:
      - MONGO_URI_PRODUCT=mongodb://mongo-product:27017/product_db

  cart-service:
    environment:
      - MONGO_URI_CART=mongodb://mongo-cart:27017/cart_db

  order-service:
    environment:
      - MONGO_URI_ORDER=mongodb://mongo-order:27017/order_db
      - USER_SERVICE_URL=http://user-service:8001
      - PRODUCT_SERVICE_URL=http://product-service:8002
      - NOTIFICATION_SERVICE_URL=http://notification-service:8008

  payment-service:
    environment:
      - MONGO_URI_PAYMENT=mongodb://mongo-payment:27017/payment_db
      - ORDER_SERVICE_URL=http://order-service:8004

  review-service:
    environment:
      - MONGO_URI_REVIEW=mongodb://mongo-review:27017/review_db
      - PRODUCT_SERVICE_URL=http://product-service:8002

  seller-service:
    environment:
      - MONGO_URI_SELLER=mongodb://mongo-seller:27017/seller_db
      - ORDER_SERVICE_URL=http://order-service:8004
      - NOTIFICATION_SERVICE_URL=http://notification-service:8008

  notification-service:
    environment:
      - MONGO_URI_NOTIFICATION=mongodb://mongo-notification:27017/notification_db

  search-service:
    environment:
      - PRODUCT_SERVICE_URL=http://product-service:8002

  recommendation-service:
    environment:
      - MONGO_URI_RECOMMENDATION=mongodb://mongo-recommendation:27017/recommendation_db
      - PRODUCT_SERVICE_URL=http://product-service:8002

  storefront-designer-service:
    environment:
      - MONGO_URI_STOREFRONT=mongodb://mongo-storefront:27017/storefront_db

  referral-service:
    environment:
      - MONGO_URI_REFERRAL=mongodb://mongo-referral:27017/referral_db

  delivery-service:
    environment:
      - MONGO_URI_DELIVERY=mongodb://mongo-delivery:27017/delivery_db

  analytics-service:
    environment:
      - MONGO_URI_ANALYTICS=mongodb://mongo-analytics:27017/analytics_db
      - ORDER_SERVICE_URL=http://order-service:8004
      - USER_SERVICE_URL=http://user-service:8001
      - PRODUCT_SERVICE_URL=http://product-service:8002

  web:
    environment:
      - USER_SERVICE_URL=http://user-service:8001
      - PRODUCT_SERVICE_URL=http://product-service:8002
      - CART_SERVICE_URL=http://cart-service:8003
      - ORDER_SERVICE_URL=http://order-service:8004
      - PAYMENT_SERVICE_URL=http://payment-service:8005
      - REVIEW_SERVICE_URL=http://review-service:8006
      - SELLER_SERVICE_URL=http://seller-service:8007
      - NOTIFICATION_SERVICE_URL=http://notification-service:8008
      - SEARCH_SERVICE_URL=http://search-service:8009
      - RECOMMENDATION_SERVICE_URL=http://recommendation-service:8010
      - STOREFRONT_SERVICE_URL=http://storefront-designer-service:8011
      - REFERRAL_SERVICE_URL=http://referral-service:8012
      - DELIVERY_SERVICE_URL=http://delivery-service:8013
      - ANALYTICS_SERVICE_URL=http://analytics-service:8014
