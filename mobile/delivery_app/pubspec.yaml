name: delivery_app
description: Bazzar Delivery Agent App — GPS tracking, order management

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  dio: ^5.4.3
  flutter_secure_storage: ^9.0.0
  hive_flutter: ^1.1.0
  google_maps_flutter: ^2.5.3
  geolocator: ^11.0.0
  background_location: ^0.9.1
  socket_io_client: ^2.0.3+1
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
