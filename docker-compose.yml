version: '3.9'

# ============================================================
# Bazzar — Monolith Stack
#
# Services:
#   Infrastructure  → mongodb, redis, kafka (KRaft), elasticsearch
#   API Monolith    → api-monolith:8100   (all merged modules)
#   Kept separate   → delivery-service:8013, notification-service:8008
#   Frontend        → web:3000
#
# Kafka runs in KRaft mode (Bitnami image) — no Zookeeper required.
# Images are hosted on Cloudinary — no local uploads volume.
# ============================================================

networks:
  bazzar-net:
    driver: bridge

volumes:
  mongo_data:
  redis_data:
  kafka_data:
  elasticsearch_data:

services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  mongodb:
    image: mongo:7.0
    container_name: bazzar-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    command: mongod --wiredTigerCacheSizeGB 0.25
    networks: [bazzar-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: bazzar-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks: [bazzar-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  kafka:
    image: bitnamilegacy/kafka:4.0.0-debian-12-r10
    container_name: bazzar-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft — no Zookeeper
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
    volumes:
      - kafka_data:/bitnami/kafka
    networks: [bazzar-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 15s
      retries: 15
      start_period: 90s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: bazzar-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks: [bazzar-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ── API Monolith ───────────────────────────────────────────────────────────
  # Replaces: user, product, cart, order, payment, review, seller,
  #           search, recommendation, storefront, referral, analytics, support

  api-monolith:
    build: ./services/api-monolith
    container_name: bazzar-api-monolith
    ports:
      - "8100:8100"
    environment:
      - NODE_ENV=development
      - PORT=8100
      - MONGO_URI=mongodb://mongodb:27017/bazzar_db
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=api-monolith
      - KAFKA_GROUP_ID=api-monolith-group
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - KHALTI_SECRET_KEY=${KHALTI_SECRET_KEY}
      - ESEWA_SECRET_KEY=${ESEWA_SECRET_KEY}
      - ESEWA_MERCHANT_CODE=${ESEWA_MERCHANT_CODE}
      - FONEPAY_MERCHANT_CODE=${FONEPAY_MERCHANT_CODE}
      - FONEPAY_SECRET_KEY=${FONEPAY_SECRET_KEY}
      - API_BASE_URL=http://api-monolith:8100
      - PUBLIC_API_URL=http://localhost:3000
      - WEB_URL=http://localhost:3000
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    depends_on:
      mongodb: { condition: service_healthy }
      kafka:   { condition: service_healthy }
      redis:   { condition: service_healthy }
    networks: [bazzar-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8100/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Kept-separate services ─────────────────────────────────────────────────
  # These were NOT merged: they have distinct runtime concerns
  # (delivery has driver-side WebSocket; notification has FCM/SMS/email sends)

  delivery-service:
    build: ./services/delivery-service
    container_name: bazzar-delivery-service
    ports:
      - "8013:8013"
    environment:
      - NODE_ENV=development
      - PORT=8013
      - MONGO_URI_DELIVERY=mongodb://mongodb:27017/delivery_db
      - MONGO_URI_ORDER=mongodb://mongodb:27017/bazzar_db
      - KAFKA_BROKERS=kafka:9092
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
    depends_on:
      mongodb: { condition: service_healthy }
      kafka:   { condition: service_healthy }
    networks: [bazzar-net]
    restart: unless-stopped

  notification-service:
    build: ./services/notification-service
    container_name: bazzar-notification-service
    ports:
      - "8008:8008"
    environment:
      - NODE_ENV=development
      - PORT=8008
      - MONGO_URI_NOTIFICATION=mongodb://mongodb:27017/notification_db
      - KAFKA_BROKERS=kafka:9092
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - SPARROW_SMS_TOKEN=${SPARROW_SMS_TOKEN}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
    depends_on:
      mongodb: { condition: service_healthy }
      kafka:   { condition: service_healthy }
    networks: [bazzar-net]
    restart: unless-stopped

  # ── Web Frontend ───────────────────────────────────────────────────────────

  web:
    build:
      context: ./web
      args:
        MONOLITH_URL: http://api-monolith:8100
        DELIVERY_SERVICE_URL: http://delivery-service:8013
        NOTIFICATION_SERVICE_URL: http://notification-service:8008
    container_name: bazzar-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_WS_URL=ws://localhost:8013
      # Single backend URL — all API traffic proxied through Next.js rewrites
      - MONOLITH_URL=http://api-monolith:8100
      - DELIVERY_SERVICE_URL=http://delivery-service:8013
      - NOTIFICATION_SERVICE_URL=http://notification-service:8008
    depends_on:
      api-monolith:
        condition: service_healthy
      delivery-service:
        condition: service_started
      notification-service:
        condition: service_started
    networks: [bazzar-net]
    restart: unless-stopped
